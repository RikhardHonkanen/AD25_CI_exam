name: Queue

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - "*"

jobs:
    check:
        name: Build & Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install
              run: |
                  sudo apt-get install build-essential cmake
                  git clone https://github.com/google/googletest
                  cd googletest && mkdir build
                  cd build && cmake .. && make
                  sudo make install
            - name: Build and Run
              run: make check
